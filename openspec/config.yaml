schema: spec-driven

context: |
    FastAPI plugin library integrated via an init_huey_dashboard(app, huey, redis, ...) pattern.
    Exposes API endpoints and WebSocket connections for real-time task updates.
    It bridges Huey background tasks to WebSockets using direct signals for local development
    and Redis Pub/Sub for production to manage cross-process worker communication.

    Tech stack: FastApi, Huey, Redis
    Code quality: ruff, ty, pytest

